name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Create screensaver file
        run: |
          Copy-Item target\release\bsaver.exe bsaver.scr

      - name: Get version from tag
        id: version
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build MSIX package
        run: |
          .\packaging\build-msix.ps1 -SkipBuild -Version "${{ steps.version.outputs.VERSION }}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Bangla Screensaver ${{ github.ref_name }}
          body: |
            ## বাংলা স্ক্রিনসেভার ${{ github.ref_name }}
            
            ### 📥 Installation
            
            **Option A: Microsoft Store (Recommended)**
            - Install from [Microsoft Store](https://apps.microsoft.com/detail/9P9FB1WN7PCV)
            
            **Option B: Direct Download**
            1. Download `BanglaSaver.exe` and `bsaver.exe` below
            2. Place them in the same folder
            3. Run `BanglaSaver.exe` → click **সেট করুন** → approve UAC
            
            **Option C: MSIX Package**
            - Download the `.msix` file and double-click to install
            - No admin required, installs per-user
            
            ### ✨ Features
            - 🕐 Bangla digital clock with Bengali numerals (০১২৩৪৫৬৭৮৯)
            - 📅 Bengali calendar (বঙ্গাব্দ) with timezone awareness
            - 🌸 Six seasons display (ষড়ঋতু)
            - 🇧🇩 Bangladesh/India regional calendar support
            - 🖥️ Native launcher UI for easy install/remove/preview
            - ⚙️ Configurable clock settings (12/24h, font size, colors)
            - 💨 Statically linked — no runtime dependencies
            
            ---
            
            See [README](https://github.com/abusayed0206/bsaver#readme) for full documentation.
          files: |
            bsaver.scr
            target/release/bsaver.exe
            target/release/BanglaSaver.exe
            output/BanglaSaver_${{ steps.version.outputs.VERSION }}.0_x64.msix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
